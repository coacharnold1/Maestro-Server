<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Artists - MPD Web Control</title>
    <script src="/static/version-loader.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 80px rgba(102, 126, 234, 0.1);
            box-sizing: border-box;
        }

        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
            font-weight: 700;
            letter-spacing: 1.5px;
            font-size: 2.2em;
            text-align: center;
            margin: 0 auto 15px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .genre-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.3em;
            font-weight: 600;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .nav-links a,
        .nav-links button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 200% 200%;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .nav-links a::before,
        .nav-links button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -1000px;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .nav-links a:hover,
        .nav-links button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .nav-links .clear-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .nav-links .clear-btn:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
        }

        /* Button Styles */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -1000px;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(240, 147, 251, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(240, 147, 251, 0.5);
        }

        /* Colorful gradient buttons for playback */
        .btn-prev {
            background: linear-gradient(135deg, #764ba2 0%, #b721c1 100%) !important;
        }

        .btn-play {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%) !important;
        }

        .btn-stop {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%) !important;
        }

        .btn-pause {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%) !important;
        }

        .btn-next {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important;
        }

        /* Base playback button styling */
        .playback-controls button {
            padding: 10px 16px;
            margin: 8px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #1a1a1a;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .playback-controls button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -1000px;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .playback-controls button:hover {
            transform: translateY(-2px);
        }

        .nav-links-breadcrumb {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .nav-links-breadcrumb:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #764ba2;
        }

        .playback-controls {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .playback-controls:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .playback-controls h2 {
            margin: 0 0 20px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.3em;
            font-weight: 600;
        }

        .playback-controls a,
        .playback-controls button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            margin: 8px;
            border: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .playback-controls a::before,
        .playback-controls button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -1000px;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .playback-controls a:hover,
        .playback-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .playback-controls button:active {
            transform: translateY(0);
        }

        .playback-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .loading {
            text-align: center;
            padding: 60px 40px;
            font-size: 1.2em;
            color: #bdc3c7;
        }

        .error {
            background: linear-gradient(135deg, rgba(245, 87, 108, 0.1) 0%, rgba(240, 147, 251, 0.05) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 87, 108, 0.3);
            color: #f5576c;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.2);
        }

        .artist-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .artist-item {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .artist-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
        }

        .artist-name {
            font-size: 1.4em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .artist-meta {
            color: #bdc3c7;
            font-size: 0.95em;
            font-weight: 500;
        }

        .letter-nav {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: none;
        }

        .letter-nav h3 {
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.1em;
            font-weight: 600;
        }

        .letter-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            margin: 4px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .letter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .letter-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);
        }

        /* Minimal theme overrides */
        body.light {
            background-color: #f5f5f7;
            color: #1a1a1a;
        }
        body.light .container {
            background-color: #ffffff;
            color: #1a1a1a;
        }
        body.light .playback-controls,
        body.light .stats,
        body.light .artist-item {
            background-color: #f0f3f6;
            border-color: #d0d7de;
        }

        body.light .now-playing-bar {
            background: linear-gradient(135deg, #f0f3f6 0%, #e8ecf0 100%);
            border-color: #d0d7de;
        }
        body.light .now-playing-bar .label {
            color: #6b7280;
        }
        body.light .now-playing-bar .info,
        body.light .now-playing-bar .track {
            color: #1a1a1a;
        }
        body.light .now-playing-bar .artist {
            color: #059669;
        }
        body.light .now-playing-bar .album {
            color: #d97706;
        }
        body.light .now-playing-bar .separator {
            color: #d0d7de;
        }

        body.high-contrast {
            background-color: #000000;
            color: #ffff00;
        }
        body.high-contrast .container {
            background-color: #000000;
            color: #ffff00;
            border: 2px solid #ffff00;
        }
        body.high-contrast .playback-controls,
        body.high-contrast .stats,
        body.high-contrast .artist-item {
            background-color: #000000;
            border: 2px solid #ffff00;
        }

        body.high-contrast .now-playing-bar {
            background: linear-gradient(135deg, #000000 0%, #111111 100%);
            border: 2px solid #ffff00;
        }
        body.high-contrast .now-playing-bar .label {
            color: #ffff00;
        }
        body.high-contrast .now-playing-bar .info,
        body.high-contrast .now-playing-bar .track,
        body.high-contrast .now-playing-bar .artist,
        body.high-contrast .now-playing-bar .album {
            color: #ffff00;
        }
        body.high-contrast .now-playing-bar .separator {
            color: #ffff00;
        }

        /* Desert theme */
        body.desert {
            background-color: #2c1810;
            color: #f4e4bc;
        }
        body.desert .container {
            background-color: #3d2f20;

        }
        body.desert .playback-controls,

        body.desert .now-playing-bar {

        body.desert .now-playing-bar .label {

        }
        body.desert .now-playing-bar .artist {

        }
        body.desert .now-playing-bar .album {
            color: #cd853f;
        }
        body.desert .now-playing-bar .separator {

        }

        /* Terminal theme */
        body.terminal {

        }
        body.terminal .playback-controls,
        body.terminal .stats,
        body.terminal .artist-item {

        body.terminal .now-playing-bar {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .nav-links a {
                margin: 0;
                width: 80%;
                max-width: 200px;
                text-align: center;
            }

            /* Mobile-friendly letter navigation */

                padding: 10px;
            }

                font-size: 0.9em;

            }

        /* Now Playing Bar */
        .now-playing-bar {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border: 1px solid #4a6279;
            border-radius: 8px;
            padding: 10px 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }
        .now-playing-bar .np-art { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background-color: #2c3e50; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3); }
        .now-playing-bar .np-content { flex: 1; text-align: center; min-width: 0; }
        .now-playing-bar .label { font-size: 0.8em; color: #95a5a6; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .now-playing-bar .info { font-size: 1.1em; color: #ecf0f1; font-weight: 500; }
        .now-playing-bar .artist { color: #27ae60; }
        .now-playing-bar .separator { color: #7f8c8d; margin: 0 8px; }
        .now-playing-bar .track { color: #3498db; }
        .now-playing-bar .album { color: #e67e22; }
        @media (max-width: 600px) {
            .now-playing-bar .np-art { width: 40px; height: 40px; }
            .now-playing-bar .info { font-size: 0.9em; }
            .now-playing-bar .separator { margin: 0 4px; }
        }

        /* ==================== PHASE 2: FIXED HEADER NAVIGATION ==================== */

    <!-- App Info + Settings (inline, always visible) -->
    <div style="text-align: center; margin: 18px auto; padding-top: 8px; border-top: 1px solid #34495e; max-width: 1000px;">
        <span id="version-info">Loading version info...</span>
        &nbsp;•&nbsp;
        <a href="/settings" style="color:#bdc3c7; text-decoration: none; border: 1px solid #3498db; padding: 4px 8px; border-radius: 4px;">Settings</a>
        &nbsp;•&nbsp;

    <script>
        (function(){
            fetch('/api/version')
                .then(r=>r.json())
                .then(d=>{var el=document.getElementById('version-info'); if(el) el.textContent = d.app_name+' v'+d.version+' ('+d.build_date+')';})
                .catch(()=>{var el=document.getElementById('version-info'); if(el) el.textContent='MPD Web Control';});
        })();

        // Get genre from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const genreName = urlParams.get('genre');

        // Update heading with genre name
        if (genreName) {
            const headingEl = document.getElementById('page-heading');
            if (headingEl) {
                headingEl.textContent = `🎵 ${decodeURIComponent(genreName)} » Artists`;
            }
        }

        // Header navigation and search
        document.addEventListener('DOMContentLoaded', function() {
            // Highlight current page in header nav
            const currentPath = window.location.pathname;
            const headerNavLinks = document.querySelectorAll('.header-nav a');
            headerNavLinks.forEach(link => {
                if (link.pathname === currentPath || (currentPath === '/browse' && link.pathname === '/browse')) {
                    link.classList.add('active');
                }
            });

            // Header search functionality with autocomplete
            let allAlbums = [];
            let allArtists = [];
            let allSongs = [];

            fetch('/api/search/autocomplete')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        allAlbums = data.albums || [];
                        allArtists = data.artists || [];
                        allSongs = data.titles || [];
                        console.log('Autocomplete data loaded:', {albums: allAlbums.length, artists: allArtists.length, songs: allSongs.length});
                    }
                })
                .catch(err => console.error('Error fetching autocomplete data:', err));

            const searchInput = document.getElementById('header-search-input');
            const searchType = document.getElementById('header-search-type');
            const autocompleteDropdown = document.getElementById('header-autocomplete-dropdown');

            function showHeaderSuggestions(query) {
                if (query.length === 0) {
                    autocompleteDropdown.style.display = 'none';
                    return;
                }
                const type = searchType.value;
                const lowerQuery = query.toLowerCase();
                let suggestions = [];

                if (type === 'any') {
                    if (allArtists.length > 0) {
                        suggestions = suggestions.concat(allArtists.filter(a => a.toLowerCase().includes(lowerQuery)));
                    }
                    if (allAlbums.length > 0) {
                        suggestions = suggestions.concat(allAlbums.filter(a => a.toLowerCase().includes(lowerQuery)));
                    }
                    if (allSongs.length > 0) {
                        suggestions = suggestions.concat(allSongs.filter(s => s.toLowerCase().includes(lowerQuery)));
                    }
                    suggestions = [...new Set(suggestions)].slice(0, 5);
                } else if (type === 'album' && allAlbums.length > 0) {
                    suggestions = allAlbums.filter(a => a.toLowerCase().includes(lowerQuery)).slice(0, 5);
                } else if (type === 'artist' && allArtists.length > 0) {
                    suggestions = allArtists.filter(a => a.toLowerCase().includes(lowerQuery)).slice(0, 5);
                } else if (type === 'title' && allSongs.length > 0) {
                    suggestions = allSongs.filter(s => s.toLowerCase().includes(lowerQuery)).slice(0, 5);
                }

                if (suggestions.length > 0) {
                    autocompleteDropdown.innerHTML = suggestions.map(s => 
                        `<div class="autocomplete-item">${escapeHtml(s)}</div>`
                    ).join('');
                    autocompleteDropdown.style.display = 'block';
                    
                    autocompleteDropdown.querySelectorAll('.autocomplete-item').forEach(item => {
                        item.addEventListener('click', function() {
                            searchInput.value = this.textContent;
                            autocompleteDropdown.style.display = 'none';
                            performHeaderSearch();
                        });
                    });
                } else {
                    autocompleteDropdown.style.display = 'none';
                }
            }

            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    showHeaderSuggestions(this.value);
                });
            }

            if (searchType) {
                searchType.addEventListener('change', function() {
                    showHeaderSuggestions(searchInput.value);
                });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function performHeaderSearch() {
                const query = searchInput ? searchInput.value.trim() : '';
                if (query.length > 0) {
                    const type = searchType ? searchType.value : 'any';
                    window.location.href = `/search?query=${encodeURIComponent(query)}&search_tag=${type}`;
                }
            }

            // Make it globally available
            window.performHeaderSearch = performHeaderSearch;
        });

        document.addEventListener('DOMContentLoaded', function () {
            // SocketIO setup for now playing bar
            const socket = io();
            const nowPlayingBar = document.getElementById('now-playing-bar');
            const npArtist = document.getElementById('np-artist');
            const npAlbum = document.getElementById('np-album');
            const npTrack = document.getElementById('np-track');
            const npArt = document.getElementById('np-art');

            // Track current art to avoid unnecessary reloads
            let currentNpArtKey = '';

            // Helper to update album art
            function updateNowPlayingArt(artist, album, songFile) {
                const artKey = `${artist}-${album}`;
                if (artKey !== currentNpArtKey && npArt) {
                    currentNpArtKey = artKey;
                    let artUrl = `/album_art?artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(album)}&size=thumb&_t=${Date.now()}`;
                    if (songFile) {
                        artUrl += `&file=${encodeURIComponent(songFile)}`;
                    }
                    npArt.src = artUrl;
                }
            }

            socket.on('mpd_status', function(data) {
                if (data.state === 'play' || data.state === 'pause') {
                    if (data.artist && data.artist !== 'N/A' && data.song_title && data.song_title !== 'N/A') {
                        nowPlayingBar.style.display = 'flex';
                        npArtist.textContent = data.artist;
                        npAlbum.textContent = data.album || 'Unknown Album';
                        npTrack.textContent = data.song_title;
                        updateNowPlayingArt(data.artist, data.album || 'Unknown Album', data.song_file || data.file);
                    } else {
                        nowPlayingBar.style.display = 'none';
                    }
                } else {
                    nowPlayingBar.style.display = 'none';
                }
            });

            // Fetch initial state to set logo correctly on page load
            fetch('/api/version')
                .then(() => fetch('/get_mpd_status'))
                .then(r => r.json())
                .then(data => {
                    if (data.state === 'play') {
                        // Logo already set to animated, no change needed
                    } else {
                        // Set to static logo
                        document.getElementById('maestro-logo-artists') && (document.getElementById('maestro-logo-artists').src = '/static/logo-static.svg');
                    }
                    if (data.state === 'play' || data.state === 'pause') {
                        if (data.artist && data.artist !== 'N/A' && data.song_title && data.song_title !== 'N/A') {
                            nowPlayingBar.style.display = 'flex';
                            npArtist.textContent = data.artist;
                            npAlbum.textContent = data.album || 'Unknown Album';
                            npTrack.textContent = data.song_title;
                            updateNowPlayingArt(data.artist, data.album || 'Unknown Album', data.song_file || data.file);
                        }
                    }
                })
                .catch(err => console.error('Error fetching initial state:', err));

            if (genreName) {
                document.getElementById('genre-title').textContent = `Genre: ${genreName}`;
                loadArtists(genreName);
            } else {
                showError('No genre specified');
            }
        });

        function loadArtists(genre) {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const artistList = document.getElementById('artist-list');
            const stats = document.getElementById('stats');

            // Show loading state
            loading.style.display = 'block';
            error.style.display = 'none';
            artistList.style.display = 'none';
            stats.style.display = 'none';

            fetch(`/api/browse/artists?genre=${encodeURIComponent(genre)}`)
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';

                    if (data.status === 'success') {
                        displayArtists(data.artists);
                        document.getElementById('artist-count').textContent = data.count;
                        stats.style.display = 'block';
                    } else {
                        showError(data.message || 'Failed to load artists');
                    }
                })
                .catch(err => {
                    loading.style.display = 'none';
                    showError('Network error loading artists: ' + err.message);
                });
        }

        function displayArtists(artists) {
            const artistList = document.getElementById('artist-list');
            const letterNav = document.getElementById('letter-nav');
            artistList.innerHTML = '';

            if (artists.length === 0) {
                artistList.innerHTML = '<li style="text-align: center; padding: 40px; color: #bdc3c7;">No artists found</li>';
                artistList.style.display = 'block';
                letterNav.style.display = 'none';
                return;
            }

            // Show letter navigation only if more than 50 artists
            if (artists.length > 50) {
                createLetterNavigation(artists);
                letterNav.style.display = 'block';
            } else {
                letterNav.style.display = 'none';
            }

            // Store all artists globally for letter jumping
            window.allArtists = artists;

            artists.forEach(artist => {
                const listItem = document.createElement('li');
                listItem.className = 'artist-item';
                listItem.onclick = () => browseAlbums(artist.name);
                listItem.setAttribute('data-artist-name', artist.name.toLowerCase());

                listItem.innerHTML = `
                    <div class="artist-name">${escapeHtml(artist.name)}</div>
                `;

                artistList.appendChild(listItem);
            });

            artistList.style.display = 'block';
        }

        function createLetterNavigation(artists) {
            const letterButtons = document.getElementById('letter-buttons');
            letterButtons.innerHTML = '';

            // Get all starting letters from artists
            const letters = new Set();
            artists.forEach(artist => {
                const firstLetter = artist.name.charAt(0).toUpperCase();
                if (firstLetter.match(/[A-Z0-9]/)) {
                    letters.add(firstLetter);
                }
            });

            // Create buttons for each letter
            Array.from(letters).sort().forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.onclick = () => jumpToLetter(letter);
                letterButtons.appendChild(btn);
            });
        }

        function jumpToLetter(letter) {
            // Remove active class from all buttons
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Add active class to clicked button
            event.target.classList.add('active');

            // Find first artist starting with this letter
            const targetArtist = window.allArtists.find(artist =>
                artist.name.charAt(0).toUpperCase() === letter
            );

            if (targetArtist) {
                const artistElement = document.querySelector(
                    `[data-artist-name="${targetArtist.name.toLowerCase()}"]`
                );
                if (artistElement) {
                    artistElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    // Highlight the artist briefly
                    artistElement.style.backgroundColor = '#e74c3c';
                    setTimeout(() => {
                        artistElement.style.backgroundColor = '';
                    }, 1000);
                }
            }
        }

        function browseAlbums(artistName) {
            window.location.href = `/browse/albums?artist=${encodeURIComponent(artistName)}&genre=${encodeURIComponent(genreName)}`;
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Playback control function
        function playbackAction(action) {
            fetch(`/${action}?ajax=1`, {
                method: 'GET'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        console.log(data.message);
                    } else {
                        console.error(data.message || `Failed to ${action}`);
                    }
                })
                .catch(err => {
                    console.error(`Error: ${err.message}`);
                });
        }
    </script>
