    <!-- App Info + Settings (inline, always visible) -->
    <div style="text-align: center; margin: 18px auto; padding-top: 8px; border-top: 1px solid #34495e; max-width: 1200px;">
        <span id="version-info">Loading version info...</span>
        &nbsp;•&nbsp;
        <a href="/settings" style="color:#bdc3c7; text-decoration: none; border: 1px solid #3498db; padding: 4px 8px; border-radius: 4px;">Settings</a>
        &nbsp;•&nbsp;
        <a href="/charts" style="color:#bdc3c7; text-decoration: none; border: 1px solid #3498db; padding: 4px 8px; border-radius: 4px;">Charts</a>
    </div>

    <script>
        (function(){
            fetch('/api/version')
                .then(r=>r.json())
                .then(d=>{var el=document.getElementById('version-info'); if(el) el.textContent = d.app_name+' v'+d.version+' ('+d.build_date+')';})
                .catch(()=>{var el=document.getElementById('version-info'); if(el) el.textContent='MPD Web Control';});
        })();

        // Header navigation and search
        document.addEventListener('DOMContentLoaded', function() {
            // Highlight current page in header nav
            const currentPath = window.location.pathname;
            const headerNavLinks = document.querySelectorAll('.header-nav a');
            headerNavLinks.forEach(link => {
                if (link.pathname === currentPath || (currentPath === '/browse' && link.pathname === '/browse')) {
                    link.classList.add('active');
                }
            });

            // Header search with autocomplete
            let allAlbums = [];
            let allArtists = [];
            let allSongs = [];

            fetch('/api/search/autocomplete')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        allAlbums = data.albums || [];
                        allArtists = data.artists || [];
                        allSongs = data.titles || [];
                        console.log('Autocomplete data loaded:', {albums: allAlbums.length, artists: allArtists.length, songs: allSongs.length});
                    }
                })
                .catch(err => console.error('Error fetching autocomplete data:', err));

            const searchInput = document.getElementById('header-search-input');
            const searchType = document.getElementById('header-search-type');
            const autocompleteDropdown = document.getElementById('header-autocomplete-dropdown');

            function showHeaderSuggestions(query) {
                if (query.length === 0) {
                    autocompleteDropdown.style.display = 'none';
                    return;
                }
                const type = searchType.value;
                const lowerQuery = query.toLowerCase();
                let suggestions = [];

                if (type === 'any') {
                    if (allArtists.length > 0) {
                        suggestions = suggestions.concat(allArtists.filter(a => a.toLowerCase().includes(lowerQuery)));
                    }
                    if (allAlbums.length > 0) {
                        suggestions = suggestions.concat(allAlbums.filter(a => a.toLowerCase().includes(lowerQuery)));
                    }
                    if (allSongs.length > 0) {
                        suggestions = suggestions.concat(allSongs.filter(s => s.toLowerCase().includes(lowerQuery)));
                    }
                    suggestions = [...new Set(suggestions)].slice(0, 5);
                } else if (type === 'album' && allAlbums.length > 0) {
                    suggestions = allAlbums.filter(a => a.toLowerCase().includes(lowerQuery)).slice(0, 5);
                } else if (type === 'artist' && allArtists.length > 0) {
                    suggestions = allArtists.filter(a => a.toLowerCase().includes(lowerQuery)).slice(0, 5);
                } else if (type === 'title' && allSongs.length > 0) {
                    suggestions = allSongs.filter(s => s.toLowerCase().includes(lowerQuery)).slice(0, 5);
                }

                if (suggestions.length > 0) {
                    autocompleteDropdown.innerHTML = suggestions.map(s => 
                        `<div class="autocomplete-item">${escapeHtml(s)}</div>`
                    ).join('');
                    autocompleteDropdown.style.display = 'block';
                    
                    autocompleteDropdown.querySelectorAll('.autocomplete-item').forEach(item => {
                        item.addEventListener('click', function() {
                            searchInput.value = this.textContent;
                            autocompleteDropdown.style.display = 'none';
                            performHeaderSearch();
                        });
                    });
                } else {
                    autocompleteDropdown.style.display = 'none';
                }
            }

            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    showHeaderSuggestions(this.value);
                });
            }

            if (searchType) {
                searchType.addEventListener('change', function() {
                    showHeaderSuggestions(searchInput.value);
                });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function performHeaderSearch() {
                const query = searchInput ? searchInput.value.trim() : '';
                if (query.length > 0) {
                    const type = searchType ? searchType.value : 'any';
                    window.location.href = `/search?query=${encodeURIComponent(query)}&search_tag=${type}`;
                }
            }

            // Make it globally available
            window.performHeaderSearch = performHeaderSearch;
        });

        // Load genres when page loads
        document.addEventListener('DOMContentLoaded', function () {
            // Check if Bandcamp is enabled and show link
            fetch('/api/settings')
                .then(response => response.json())
                .then(data => {
                    if (data.bandcamp_enabled && data.bandcamp_username && data.bandcamp_identity_token) {
                        const bandcampLink = document.getElementById('bandcamp-link');
                        if (bandcampLink) {
                            bandcampLink.style.display = 'inline-block';
                        }
                    }
                })
                .catch(err => console.error('Error loading settings:', err));

            // SocketIO setup for now playing bar
            const socket = io();
            const nowPlayingBar = document.getElementById('now-playing-bar');
            const npArtist = document.getElementById('np-artist');
            const npAlbum = document.getElementById('np-album');
            const npTrack = document.getElementById('np-track');
            const npArt = document.getElementById('np-art');
            const maestroLogo = document.getElementById('maestro-logo-genres');

            // Track current art to avoid unnecessary reloads
            let currentNpArtKey = '';

            // Helper to update album art
            function updateNowPlayingArt(artist, album) {
                const artKey = `${artist}-${album}`;
                if (artKey !== currentNpArtKey && npArt) {
                    currentNpArtKey = artKey;
                    npArt.src = `/album_art?artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(album)}&size=thumb&_t=${Date.now()}`;
                }
            }

            // Update now playing bar with MPD status
            socket.on('mpd_status', function(data) {
                if (data.state === 'play' || data.state === 'pause') {
                    if (data.artist && data.artist !== 'N/A' && data.song_title && data.song_title !== 'N/A') {
                        nowPlayingBar.style.display = 'flex';
                        npArtist.textContent = data.artist;
                        npAlbum.textContent = data.album || 'Unknown Album';
                        npTrack.textContent = data.song_title;
                        updateNowPlayingArt(data.artist, data.album || 'Unknown Album');
                    } else {
                        nowPlayingBar.style.display = 'none';
                    }
                    if (maestroLogo) {
                        maestroLogo.src = data.state === 'play' ? "{{ url_for('static', filename='logo.svg') }}" : "{{ url_for('static', filename='logo-static.svg') }}";
                    }
                } else {
                    nowPlayingBar.style.display = 'none';
                    if (maestroLogo) maestroLogo.src = "{{ url_for('static', filename='logo-static.svg') }}";
                }
            });

            // Fetch initial state to set logo correctly on page load
            fetch('/api/version')
                .then(() => fetch('/get_mpd_status'))
                .then(r => r.json())
                .then(data => {
                    if (maestroLogo && data.state === 'play') {
                        maestroLogo.src = "{{ url_for('static', filename='logo.svg') }}";
                    } else if (maestroLogo) {
                        maestroLogo.src = "{{ url_for('static', filename='logo-static.svg') }}";
                    }
                    if (data.state === 'play' || data.state === 'pause') {
                        if (data.artist && data.artist !== 'N/A' && data.song_title && data.song_title !== 'N/A') {
                            nowPlayingBar.style.display = 'flex';
                            npArtist.textContent = data.artist;
                            npAlbum.textContent = data.album || 'Unknown Album';
                            npTrack.textContent = data.song_title;
                            updateNowPlayingArt(data.artist, data.album || 'Unknown Album');
                        }
                    }
                })
                .catch(err => console.error('Error fetching initial state:', err));

            loadGenres();
        });

        function loadGenres() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const genreList = document.getElementById('genre-list');
            const stats = document.getElementById('stats');

            // Show loading state
            loading.style.display = 'block';
            error.style.display = 'none';
            genreList.style.display = 'none';
            stats.style.display = 'none';

            fetch('/api/browse/genres')
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';

                    if (data.status === 'success') {
                        displayGenres(data.genres);
                        document.getElementById('genre-count').textContent = data.count;
                        stats.style.display = 'block';
                    } else {
                        showError(data.message || 'Failed to load genres');
                    }
                })
                .catch(err => {
                    loading.style.display = 'none';
                    showError('Network error loading genres: ' + err.message);
                });
        }

        function displayGenres(genres) {
            const genreList = document.getElementById('genre-list');
            const letterNav = document.getElementById('letter-nav');

            genreList.innerHTML = '';

            if (genres.length === 0) {
                genreList.innerHTML = '<div style="text-align: center; padding: 40px; color: #bdc3c7;">No genres found</div>';
                genreList.style.display = 'block';
                letterNav.style.display = 'none';
                return;
            }

            // Create letter navigation
            createLetterNavigation(genres);
            letterNav.style.display = 'block';

            // Store all genres globally for letter jumping
            window.allGenres = genres;

            genres.forEach(genre => {
                const genreItem = document.createElement('div');
                genreItem.className = 'genre-item';
                genreItem.onclick = () => browseArtists(genre.name);
                genreItem.setAttribute('data-genre-name', genre.name.toLowerCase());

                genreItem.innerHTML = `
                    <div class="genre-info">
                        <div class="genre-name">${escapeHtml(genre.name)}</div>
                    </div>
                    <div class="genre-arrow">→</div>
                `;

                genreList.appendChild(genreItem);
            });

            genreList.style.display = 'block';
        }

        function createLetterNavigation(genres) {
            const letterButtons = document.getElementById('letter-buttons');
            letterButtons.innerHTML = '';

            // Get all starting letters from genres
            const letters = new Set();
            genres.forEach(genre => {
                const firstLetter = genre.name.charAt(0).toUpperCase();
                if (firstLetter.match(/[A-Z0-9]/)) {
                    letters.add(firstLetter);
                }
            });

            // Create buttons for each letter
            Array.from(letters).sort().forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.onclick = () => jumpToLetter(letter);
                letterButtons.appendChild(btn);
            });
        }

        function jumpToLetter(letter) {
            // Remove active class from all buttons
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Add active class to clicked button
            event.target.classList.add('active');

            // Find first genre starting with this letter
            const targetGenre = window.allGenres.find(genre =>
                genre.name.charAt(0).toUpperCase() === letter
            );

            if (targetGenre) {
                const genreElement = document.querySelector(
                    `[data-genre-name="${targetGenre.name.toLowerCase()}"]`
                );
                if (genreElement) {
                    genreElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    // Highlight the genre briefly
                    genreElement.style.backgroundColor = '#e74c3c';
                    setTimeout(() => {
                        genreElement.style.backgroundColor = '';
                    }, 1000);
                }
            }
        }

        // Add keyboard navigation (desktop only)
        document.addEventListener('keydown', function (event) {
            // Only enable keyboard navigation on larger screens (desktop)
            if (window.innerWidth > 600 &&
                event.target.tagName !== 'INPUT' &&
                event.target.tagName !== 'TEXTAREA') {
                const key = event.key.toUpperCase();
                if (key.match(/[A-Z0-9]/) && window.allGenres) {
                    event.preventDefault(); // Prevent any default behavior
                    jumpToLetter(key);
                }
            }
        });

        function browseArtists(genreName) {
            window.location.href = `/browse/artists?genre=${encodeURIComponent(genreName)}`;
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }

        function clearPlaylist() {
            if (confirm('Are you sure you want to clear the entire playlist?')) {
                fetch('/clear_playlist', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            showMessage('Playlist cleared', 'success');
                        } else {
                            showMessage(data.message || 'Failed to clear playlist', 'error');
                        }
                    })
                    .catch(err => {
                        showMessage('Error clearing playlist: ' + err.message, 'error');
                    });
            }
        }

        function showMessage(text, type) {
            // Remove any existing messages
            const existingMessages = document.querySelectorAll('.message');
            existingMessages.forEach(msg => msg.remove());

            // Create new message
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            document.body.appendChild(message);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                message.style.opacity = '0';
                setTimeout(() => {
                    if (message.parentNode) {
                        message.parentNode.removeChild(message);
                    }
                }, 300);
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Playback control function
        function playbackAction(action) {
            fetch(`/${action}?ajax=1`, {
                method: 'GET'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        showMessage(data.message, 'success');
                    } else {
                        showMessage(data.message || `Failed to ${action}`, 'error');
                    }
                })
                .catch(err => {
                    showMessage(`Error: ${err.message}`, 'error');
                });
        }
    </script>
    <!-- Keyboard Shortcuts -->
    <!-- Playback Controls -->
    <script src="/static/playback-controls.js"></script>
    <script src="/static/keyboard-shortcuts.js"></script>
</body>
