<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Albums - MPD Web Control</title>
    <script src="/static/version-loader.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: #ecf0f1;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #ecf0f1;
            text-align: center;
            margin-bottom: 10px;
        }

        .artist-title {
            color: #3498db;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-links a,
        .nav-links button {
            color: #3498db;
            text-decoration: none;
            margin: 0 6px 5px 6px;
            padding: 6px 12px;
            border: 1px solid #3498db;
            border-radius: 5px;
            transition: all 0.3s;
            background: none;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
        }

        .nav-links a:hover,
        .nav-links button:hover {
            background-color: #3498db;
            color: white;
        }

        .nav-links .clear-btn {
            background-color: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .nav-links .clear-btn:hover {
            background-color: #c0392b;
            border-color: #c0392b;
        }

        .clear-btn {
            background-color: #e74c3c;
            color: white;
            border: 1px solid #e74c3c;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background-color: #c0392b;
            border-color: #c0392b;
        }

        .playback-controls .clear-btn {
            background-color: #e74c3c;
            color: white;
            border: 1px solid #e74c3c;
        }

        .playback-controls .clear-btn:hover {
            background-color: #c0392b;
            border-color: #c0392b;
        }

        .playback-controls {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #34495e;
            border-radius: 10px;
        }

        .playback-controls h2 {
            margin: 0 0 10px 0;
            color: #ecf0f1;
            font-size: 1.1em;
        }

        .playback-controls a {
            display: inline-block;
            background-color: #ecf0f1;
            color: #2c3e50;
            text-decoration: none;
            padding: 10px 15px;
            margin: 4px;
            border-radius: 6px;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            min-width: 80px;
            text-align: center;
        }

        .playback-controls a:hover {
            background-color: #bdc3c7;
            transform: translateY(-1px);
        }

        .playback-controls button {
            background-color: #ecf0f1;
            color: #2c3e50;
            border: none;
            padding: 10px 15px;
            margin: 4px;
            border-radius: 6px;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            min-width: 80px;
            font-size: 0.9em;
        }

        .playback-controls button:hover {
            background-color: #bdc3c7;
            transform: translateY(-1px);
        }

        .playback-controls button:active {
            transform: translateY(0);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .playback-controls button:disabled {
            background-color: #6c7a89;
            color: #aeb6bf;
            cursor: not-allowed;
            box-shadow: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #bdc3c7;
        }

        .error {
            background-color: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .album-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .album-item {
            background-color: #34495e;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #3498db;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .album-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .album-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .album-thumbnail {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: #2c3e50;
            border: 1px solid #3498db;
        }

        .album-content {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            flex: 1;
        }

        .album-info {
            flex: 1;
        }

        .album-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #ecf0f1;
            margin-bottom: 5px;
        }

        .album-artist {
            font-size: 1.1em;
            color: #bdc3c7;
            margin-bottom: 8px;
        }

        .album-meta {
            font-size: 0.9em;
            color: #95a5a6;
            margin-bottom: 5px;
        }

        .album-year {
            font-size: 0.85em;
            color: #7f8c8d;
        }

        .album-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .album-details {
            margin-top: 15px;
            padding: 15px;
            background-color: #2c3e50;
            border-radius: 10px;
            border-left: 3px solid #e74c3c;
        }

        .tracks-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #34495e;
        }

        .track-item:last-child {
            border-bottom: none;
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            color: #ecf0f1;
            font-weight: 500;
        }

        .track-duration {
            color: #bdc3c7;
            font-size: 0.9em;
        }

        .track-actions {
            margin-left: 10px;
        }

        .stats {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #34495e;
            border-radius: 8px;
            color: #bdc3c7;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            transition: opacity 0.3s;
        }

        .message.success {
            background-color: #27ae60;
        }

        .message.error {
            background-color: #e74c3c;
        }

        .message.info {
            background-color: #3498db;
        }

        /* Now Playing Bar */
        .now-playing-bar {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border: 1px solid #4a6279;

        .now-playing-bar .np-art { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background-color: #2c3e50; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3); }
        .now-playing-bar .np-content { flex: 1; text-align: center; min-width: 0; }

        /* Phase 2: Fixed Header Navigation */
        .fixed-header {
            background-color: #2c3e50;
            border-bottom: 2px solid #34495e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            padding: 0;
            margin: 0 0 20px 0;
            width: 100%;
            box-sizing: border-box;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 20px;
            box-sizing: border-box;
            width: 100%;
        }

        .header-nav {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .header-nav a,
        .header-nav button {
            color: #3498db;
            text-decoration: none;
            padding: 8px 14px;
            border: 1px solid #3498db;
            border-radius: 5px;
            background: none;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .header-nav a:hover,
        .header-nav button:hover {
            color: white;
            background-color: #3498db;
        }

        .header-nav a.active {
            color: #1a1a1a;
            background-color: #f39c12 !important;
            border-color: #f39c12 !important;
            font-weight: bold;
        }

        .header-search {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: nowrap;
            justify-content: center;
        }

        .header-search input,
        .header-search select {
            padding: 8px 12px;
            border: 1px solid #3498db;
            border-radius: 5px;
            background-color: #34495e;
            color: #ecf0f1;
            font-size: 0.9em;
        }

        .header-search select {
            max-width: 100px;
            flex-shrink: 0;
        }

        .header-search input {
            width: auto;
            max-width: 175px;
            min-width: 100px;
        }

        .header-search button {
            flex-shrink: 0;
        }

        .random-albums-btn {
            flex-shrink: 0;
        }

        .header-search input::placeholder {
            color: #95a5a6;
        }

        .header-search input:focus,
        .header-search select:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }

        .header-search button {
            padding: 8px 16px;
            background-color: #3498db;
            color: white;

    <!-- Header Search Functionality with Autocomplete -->
    <script>
        // Load autocomplete data
        let allAlbums = [];
        let allArtists = [];
        let allSongs = [];

        fetch('/api/search/autocomplete')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    allAlbums = data.albums || [];
                    allArtists = data.artists || [];
                    allSongs = data.titles || [];
                    console.log('Autocomplete data loaded:', {albums: allAlbums.length, artists: allArtists.length, songs: allSongs.length});
                }
            })
            .catch(err => console.error('Error fetching autocomplete data:', err));

        const searchInput = document.getElementById('header-search-input');
        const searchType = document.getElementById('header-search-type');
        const autocompleteDropdown = document.getElementById('header-autocomplete-dropdown');

        function showHeaderSuggestions(query) {
            if (query.length === 0) {
                autocompleteDropdown.style.display = 'none';
                return;
            }
            const type = searchType.value;
            const lowerQuery = query.toLowerCase();
            let suggestions = [];

            if (type === 'any') {
                if (allArtists.length > 0) {
                    suggestions = suggestions.concat(allArtists.filter(a => a.toLowerCase().includes(lowerQuery)));
                }
                if (allAlbums.length > 0) {
                    suggestions = suggestions.concat(allAlbums.filter(a => a.toLowerCase().includes(lowerQuery)));
                }
                if (allSongs.length > 0) {
                    suggestions = suggestions.concat(allSongs.filter(s => s.toLowerCase().includes(lowerQuery)));
                }
                suggestions = [...new Set(suggestions)].slice(0, 5);
            } else if (type === 'album' && allAlbums.length > 0) {
                suggestions = allAlbums.filter(a => a.toLowerCase().includes(lowerQuery)).slice(0, 5);
            } else if (type === 'artist' && allArtists.length > 0) {
                suggestions = allArtists.filter(a => a.toLowerCase().includes(lowerQuery)).slice(0, 5);
            } else if (type === 'title' && allSongs.length > 0) {
                suggestions = allSongs.filter(s => s.toLowerCase().includes(lowerQuery)).slice(0, 5);
            }

            if (suggestions.length > 0) {
                autocompleteDropdown.innerHTML = suggestions.map(s => 
                    `<div class="autocomplete-item">${escapeHtml(s)}</div>`
                ).join('');
                autocompleteDropdown.style.display = 'block';
                
                autocompleteDropdown.querySelectorAll('.autocomplete-item').forEach(item => {
                    item.addEventListener('click', function() {
                        searchInput.value = this.textContent;
                        autocompleteDropdown.style.display = 'none';
                        performHeaderSearch();
                    });
                });
            } else {
                autocompleteDropdown.style.display = 'none';
            }
        }

        if (searchInput) {
            searchInput.addEventListener('input', function() {
                showHeaderSuggestions(this.value);
            });
        }

        if (searchType) {
            searchType.addEventListener('change', function() {
                showHeaderSuggestions(searchInput.value);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function performHeaderSearch() {
            const query = searchInput ? searchInput.value.trim() : '';
            if (query.length > 0) {
                const type = searchType ? searchType.value : 'any';
                window.location.href = `/search?query=${encodeURIComponent(query)}&search_tag=${type}`;
            }
        }

        // Make it globally available
        window.performHeaderSearch = performHeaderSearch;
    </script>
    <!-- Keyboard Shortcuts -->
    <!-- Playback Controls -->
    <script src="/static/playback-controls.js"></script>
    <script src="/static/keyboard-shortcuts.js"></script>
</body>
